<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="灯 Tomoshibi">
  <defs>
    <!-- 夜空（アプリの night トークン） -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2A3550"/>
      <stop offset="1" stop-color="#1E2742"/>
    </linearGradient>
    <!-- 炎本体（黄 → コーラル） -->
    <linearGradient id="flame" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#FFE6A8"/>
      <stop offset="0.45" stop-color="#FFD166"/>
      <stop offset="1" stop-color="#FF8C6B"/>
    </linearGradient>
    <!-- 内炎（白熱コア） -->
    <linearGradient id="core" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#FFFDF6"/>
      <stop offset="1" stop-color="#FFE6A8"/>
    </linearGradient>
    <!-- 温かなハロー -->
    <radialGradient id="halo" cx="0.5" cy="0.42" r="0.5">
      <stop offset="0" stop-color="#FFE6A8" stop-opacity="0.85"/>
      <stop offset="0.55" stop-color="#FFD166" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#FFD166" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.1"/>
    </filter>
  </defs>

  <!-- 角丸の夜空 -->
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#sky)"/>

  <!-- 星屑（蝋燭グローの粒） -->
  <circle cx="15" cy="16" r="1" fill="#FFE6A8" opacity="0.85"/>
  <circle cx="49" cy="13" r="1.1" fill="#FFE6A8" opacity="0.7"/>
  <circle cx="51" cy="30" r="0.8" fill="#ffffff" opacity="0.6"/>
  <circle cx="13" cy="33" r="0.8" fill="#FFE6A8" opacity="0.55"/>

  <!-- ともしびのハロー -->
  <circle cx="32" cy="33" r="22" fill="url(#halo)"/>

  <!-- 炎（やわらかいにじみ） -->
  <g filter="url(#soft)">
    <path fill="url(#flame)" d="M32 11
      C 41 24, 48 31, 47 42
      C 46 52, 39 56, 32 56
      C 25 56, 18 52, 17 42
      C 16 32, 23 23, 32 11 Z"/>
  </g>
  <!-- 内炎 -->
  <path fill="url(#core)" d="M32 27
    C 37 34, 40 38, 39 44
    C 38 50, 35 52, 32 52
    C 29 52, 26 50, 25 44
    C 24 39, 27 34, 32 27 Z"/>
</svg>
